<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Way - Анкета</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #3b82f6;
            --accent-light: #60a5fa;
            --text-main: #f8fafc;
            --text-desc: #cbd5e1;
            --input-bg: #1e293b;
            --disabled: #334155;
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container { width: 100%; max-width: 420px; padding: 20px 24px; display: flex; flex-direction: column; align-items: center; }
        
        .progress-stepper { display: flex; gap: 8px; margin-bottom: 30px; width: 100%; }
        .dot { height: 4px; flex-grow: 1; background: rgba(255,255,255,0.1); border-radius: 10px; transition: 0.4s; }
        .dot.active { background: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }
        .dot.completed { background: rgba(255,255,255,0.4); }

        .step { display: none; width: 100%; flex-direction: column; }
        .step.active { display: flex; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; text-align: center; }
        .description { font-size: 14px; color: var(--text-desc); margin-bottom: 25px; text-align: center; line-height: 1.5; }

        .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .gender-card {
            background: var(--card-bg); border-radius: 24px; padding: 25px 10px; border: 2px solid transparent;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.3s;
        }
        .gender-card.selected { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }
        .gender-card svg { width: 40px; height: 40px; fill: white; }

        .input-group { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        input {
            font-family: 'Comfortaa', sans-serif; width: 100%; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 18px;
            color: white; font-size: 16px; box-sizing: border-box; outline: none; text-align: center;
        }

        .option-grid { display: grid; gap: 12px; width: 100%; }
        .option-card {
            background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.2s; text-align: center; font-weight: 600;
        }
        .option-card.selected { border-color: var(--accent-light); background: var(--accent-color); }

        .footer { width: 100%; margin-top: auto; padding: 20px 0; display: flex; gap: 12px; }
        .main-btn {
            font-family: 'Comfortaa', sans-serif; background: var(--accent-color); color: white; border: none;
            flex-grow: 1; padding: 18px; border-radius: 22px; font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .main-btn:disabled { background: var(--disabled); opacity: 0.5; }
        .back-btn {
            background: var(--card-bg); color: white; border: 1px solid rgba(255,255,255,0.1);
            width: 70px; border-radius: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-stepper" id="stepper">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="step active" id="step0">
        <h1>Знакомство</h1>
        <div class="description">Как мне к тебе обращаться?</div>
        <div class="input-group">
            <input type="text" id="user_name" placeholder="Твоё имя" oninput="validate(0)">
        </div>
        
        <div class="description" style="margin-top: 25px;">Твой пол</div>
        <div class="gender-grid">
            <div class="gender-card" id="g_male" onclick="setGender('male')">
                <svg viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm9 7h-6v13h-2v-6h-2v6H9V9H3V7h18v2z"/></svg>
                <b>Мужской</b>
            </div>
            <div class="gender-card" id="g_female" onclick="setGender('female')">
                <svg viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm7 15l-3.5-10h-7L5 17h4v5h6v-5h4z"/></svg>
                <b>Женский</b>
            </div>
        </div>
        <div class="footer">
            <button class="main-btn" id="btn0" disabled onclick="nextStep(1)">Продолжить</button>
        </div>
    </div>

    <div class="step" id="step1">
        <h1>Параметры</h1>
        <div class="description">Это нужно для расчета калорий и нагрузок.</div>
        <div class="input-group">
            <input type="number" id="user_age" placeholder="Возраст" oninput="validate(1)">
            <input type="number" id="user_height" placeholder="Рост (см)" oninput="validate(1)">
            <input type="number" id="user_weight" placeholder="Вес (кг)" oninput="validate(1)">
        </div>
        <div class="footer">
            <div class="back-btn" onclick="prevStep(0)">←</div>
            <button class="main-btn" id="btn1" disabled onclick="nextStep(2)">Далее</button>
        </div>
    </div>

    <div class="step" id="step2">
        <h1>Твоя цель</h1>
        <div class="description">Чего мы хотим достичь?</div>
        <div class="option-grid">
            <div class="option-card" onclick="setGoal(this, 'weight_loss')">Похудение</div>
            <div class="option-card" onclick="setGoal(this, 'muscle_gain')">Набор массы</div>
            <div class="option-card" onclick="setGoal(this, 'keep_fit')">Поддержание формы</div>
        </div>
        <div class="footer">
            <div class="back-btn" onclick="prevStep(1)">←</div>
            <button class="main-btn" id="btn2" disabled onclick="finish()">Запустить</button>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let answers = {
        name: '', gender: '',
        age: '', height: '', weight: '',
        goal: ''
    };

    function setGender(val) {
        answers.gender = val;
        document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('g_' + val).classList.add('selected');
        validate(0);
    }

    function setGoal(el, val) {
        answers.goal = val;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        validate(2);
    }

    function validate(step) {
        let btn = document.getElementById('btn' + step);
        if (step === 0) {
            answers.name = document.getElementById('user_name').value.trim();
            btn.disabled = !(answers.name && answers.gender);
        } else if (step === 1) {
            answers.age = document.getElementById('user_age').value;
            answers.height = document.getElementById('user_height').value;
            answers.weight = document.getElementById('user_weight').value;
            btn.disabled = !(answers.age && answers.height && answers.weight);
        } else if (step === 2) {
            btn.disabled = !answers.goal;
        }
    }

    function nextStep(s) {
        document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('active', i === s);
            d.classList.toggle('completed', i < s);
        });
    }

    function prevStep(s) { nextStep(s); }

    function finish() {
        tg.sendData(JSON.stringify(answers));
        tg.close();
    }
</script>
</body>
</html>
