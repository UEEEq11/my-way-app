<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Way</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #3b82f6;
            --text-main: #f8fafc;
            --text-desc: #cbd5e1;
            --input-bg: #1e293b;
        }

        * {
            font-family: 'Comfortaa', sans-serif;
            font-weight: 700; /* Везде жирный шрифт */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh; overflow: hidden;
        }

        .container { padding: 25px; padding-bottom: 100px; }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        .step { display: none; flex-direction: column; gap: 20px; }
        .step.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 20px; text-align: center; margin-bottom: 5px; color: var(--text-main); }
        .slogan { text-align: center; color: var(--text-desc); font-size: 12px; margin-bottom: 30px; font-weight: 400; }

        /* Поля ввода без ползунков */
        input {
            width: 100%; padding: 18px; background: var(--input-bg);
            border: 2px solid rgba(255,255,255,0.05); border-radius: 18px;
            color: white; font-size: 16px; box-sizing: border-box; outline: none; text-align: center;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        /* Фигуры вместо полов */
        .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .gender-card {
            background: var(--card-bg); border-radius: 22px; padding: 30px 10px;
            text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.3s;
        }
        .gender-card svg { width: 50px; height: 50px; fill: white; margin-bottom: 10px; }
        .gender-card.selected { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }

        .option-card {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.05); text-align: center; cursor: pointer;
        }
        .option-card.selected { background: var(--accent-color); border-color: white; }

        .main-btn {
            background: var(--accent-color); color: white; border: none;
            padding: 20px; border-radius: 22px; width: 100%; font-size: 16px;
            cursor: pointer; margin-top: 10px;
        }
        .main-btn:disabled { opacity: 0.3; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 80px; background: rgba(15, 23, 42, 0.98);
            display: none; grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-size: 11px; color: var(--text-desc); opacity: 0.5;
        }
        .nav-item.active { color: var(--accent-color); opacity: 1; }

        .menu-item {
            background: var(--card-bg); border-radius: 24px; padding: 22px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="survey-page" class="page active">
        <h1>Завтра будет все намного проще</h1>
        <div class="slogan">Твой путь начинается здесь</div>
        
        <div class="step active" id="s1">
            <input type="text" id="u_name" placeholder="Имя (необязательно)">
            <div style="font-size: 11px; text-align: center; color: var(--text-desc); margin-bottom: 10px;">
                Если оставить пустым, используем имя из профиля
            </div>
            <div class="gender-grid">
                <div class="gender-card" id="g_male" onclick="setG('male')">
                    <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
                    <div>ТРЕУГОЛЬНИК</div>
                </div>
                <div class="gender-card" id="g_female" onclick="setG('female')">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                    <div>КРУГ</div>
                </div>
            </div>
            <button class="main-btn" id="b1" disabled onclick="nextS(2)">Далее</button>
        </div>

        <div class="step" id="s2">
            <input type="number" id="u_age" placeholder="Возраст" step="1" oninput="checkS2()">
            <input type="number" id="u_height" placeholder="Рост (см)" step="0.1" oninput="checkS2()">
            <input type="number" id="u_weight" placeholder="Вес (кг)" step="0.1" oninput="checkS2()">
            <div style="text-align: center; font-size: 12px; color: var(--accent-color);" id="bmi_res"></div>
            <button class="main-btn" id="b2" disabled onclick="nextS(3)">Далее</button>
        </div>

        <div id="s3" class="step">
            <div class="option-card" onclick="setGoal(this, 'weight_loss')">ПОХУДЕНИЕ</div>
            <div class="option-card" onclick="setGoal(this, 'muscle_gain')">НАБОР МАССЫ</div>
            <div class="option-card" onclick="setGoal(this, 'keep_fit')">ПОДДЕРЖАНИЕ ФОРМЫ</div>
            <button class="main-btn" id="b3" disabled onclick="finishSurvey()">ЗАВЕРШИТЬ</button>
        </div>
    </div>

    <div id="main-page" class="page">
        <h1 id="hi_user">ПРИВЕТ</h1>
        <div class="menu-item"><h3>ТРЕНИРОВКА ДНЯ</h3><p>ПРОГРАММА СОСТАВЛЕНА</p></div>
        <div class="menu-item"><h3>ПИТАНИЕ</h3><p>ПЛАН НА СЕГОДНЯ</p></div>
    </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
    <div class="nav-item active" onclick="tab('main')">ГЛАВНАЯ</div>
    <div class="nav-item" onclick="tab('profile')">ПРОФИЛЬ</div>
    <div class="nav-item" onclick="tab('settings')">НАСТРОЙКИ</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let data = { 
        name: tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : 'Атлет', 
        gender: '', age: '', height: '', weight: '', goal: '' 
    };

    function setG(g) {
        data.gender = g;
        document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('g_'+g).classList.add('selected');
        document.getElementById('b1').disabled = false;
    }

    function checkS2() {
        data.age = document.getElementById('u_age').value;
        data.height = document.getElementById('u_height').value;
        data.weight = document.getElementById('u_weight').value;
        
        if(data.height && data.weight) {
            let hm = data.height / 100;
            let bmi = (data.weight / (hm * hm)).toFixed(1);
            let desc = "";
            if(bmi < 18.5) desc = "Дефицит веса";
            else if(bmi < 25) desc = "Норма";
            else if(bmi < 30) desc = "Лишний вес";
            else desc = "Ожирение";
            document.getElementById('bmi_res').innerText = `ИМТ: ${bmi} (${desc})`;
        }
        document.getElementById('b2').disabled = !(data.age && data.height && data.weight);
    }

    function setGoal(el, g) {
        data.goal = g;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('b3').disabled = false;
    }

    function nextS(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
    }

    function finishSurvey() {
        let inputName = document.getElementById('u_name').value.trim();
        if(inputName) data.name = inputName;
        
        data.action = 'survey_done';
        tg.sendData(JSON.stringify(data));

        document.getElementById('survey-page').classList.remove('active');
        document.getElementById('main-page').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'grid';
        document.getElementById('hi_user').innerText = `ПРИВЕТ, ${data.name.toUpperCase()}`;
    }

    function tab(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(name + '-page').classList.add('active');
    }
</script>
</body>
</html>
