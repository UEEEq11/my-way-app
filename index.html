<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Way</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #3b82f6;
            --text-main: #f8fafc;
            --text-desc: #cbd5e1;
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { padding: 20px; padding-bottom: 90px; }

        /* ЭКРАНЫ */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* КАРТОЧКИ МЕНЮ */
        .menu-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .menu-card h3 { margin: 0; font-size: 16px; }
        .menu-card p { margin: 5px 0 0; font-size: 12px; color: var(--text-desc); }
        .icon { font-size: 24px; }

        /* НИЖНЯЯ НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 75px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            display: grid; grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 5px; font-size: 10px;
            color: var(--text-desc); cursor: pointer; opacity: 0.6;
        }
        .nav-item.active { color: var(--accent-color); opacity: 1; }

        /* СТИЛИ АНКЕТЫ (из прошлого шага) */
        .step { display: none; flex-direction: column; }
        .step.active { display: flex; }
        input { 
            width: 100%; padding: 15px; background: #1e293b; border: none; 
            border-radius: 15px; color: white; margin-bottom: 10px; box-sizing: border-box;
        }
        .main-btn {
            background: var(--accent-color); color: white; border: none;
            padding: 18px; border-radius: 20px; width: 100%; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="survey-page" class="page active">
        <h1>Твоя база</h1>
        <div class="step active" id="step0">
            <p>Как тебя зовут?</p>
            <input type="text" id="user_name" placeholder="Имя">
            <button class="main-btn" onclick="nextPage()">Начать</button>
        </div>
    </div>

    <div id="main-page" class="page">
        <h1 id="welcome-user">Привет!</h1>
        
        <div class="menu-card">
            <div class="icon">🏋️</div>
            <div>
                <h3>Тренировка дня</h3>
                <p>ИИ подготовил план на сегодня</p>
            </div>
        </div>

        <div class="menu-card">
            <div class="icon">🥗</div>
            <div>
                <h3>Питание</h3>
                <p>Твои калории и БЖУ</p>
            </div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <h1>Профиль</h1>
        <div class="menu-card">
            <div id="profile-info">Загрузка данных...</div>
        </div>
    </div>
</div>

<nav class="bottom-nav" id="bottom-nav" style="display: none;">
    <div class="nav-item active" onclick="switchTab('main')">
        <span>🏠</span><span>Главная</span>
    </div>
    <div class="nav-item" onclick="switchTab('profile')">
        <span>📊</span><span>Профиль</span>
    </div>
    <div class="nav-item" onclick="switchTab('settings')">
        <span>⚙️</span><span>Настройки</span>
    </div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function nextPage() {
        const name = document.getElementById('user_name').value;
        if(!name) return alert("Введите имя");
        
        // Посылаем данные боту, но НЕ закрываем окно
        tg.sendData(JSON.stringify({name: name, action: 'survey_done'}));
        
        // Переключаем интерфейс
        document.getElementById('survey-page').classList.remove('active');
        document.getElementById('main-page').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'grid';
        document.getElementById('welcome-user').innerText = `Привет, ${name}!`;
    }

    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        if(tab === 'main') {
            document.getElementById('main-page').classList.add('active');
            event.currentTarget.classList.add('active');
        } else if(tab === 'profile') {
            document.getElementById('profile-page').classList.add('active');
            event.currentTarget.classList.add('active');
        }
    }
</script>
</body>
</html>
