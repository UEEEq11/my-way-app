<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Way</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #3b82f6;
            --text-main: #f8fafc;
            --text-desc: #cbd5e1;
            --input-bg: #1e293b;
        }

        * {
            font-family: 'Comfortaa', sans-serif;
            font-weight: 700;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            outline: none !important;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { padding: 20px; padding-bottom: 100px; }

        .page { display: none; }
        .page.active { display: block; animation: pageIn 0.5s ease forwards; }
        @keyframes pageIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .step { display: none; flex-direction: column; gap: 20px; }
        .step.active { display: flex; animation: stepFade 0.4s ease forwards; }
        @keyframes stepFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .title-wrapper { display: flex; justify-content: center; margin-bottom: 5px; min-height: 30px; }
        .letter { display: inline-block; font-size: 16px; text-transform: uppercase; white-space: pre; }
        .letter.animate { animation: jumpOnce 0.8s ease-out forwards; }
        @keyframes jumpOnce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); color: var(--accent-color); }
        }

        .main-slogan { text-align: center; color: var(--text-desc); font-size: 10px; font-weight: 400; opacity: 0.5; margin-bottom: 20px; letter-spacing: 1px; }
        .step-pure-text { text-align: center; font-size: 13px; color: var(--text-desc); font-weight: 400; line-height: 1.5; margin-bottom: 25px; min-height: 40px; }

        input { width: 100%; padding: 18px; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; color: white; font-size: 16px; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--accent-color); }

        .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .gender-card { background: var(--card-bg); border-radius: 22px; padding: 30px 10px; text-align: center; border: 1px solid transparent; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .gender-card.selected { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }
        .shape-svg { width: 60px; height: 80px; }
        .gender-label { margin-top: 12px; font-size: 10px; letter-spacing: 1px; color: var(--text-desc); }

        .option-card { background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; cursor: pointer; transition: 0.2s; }
        .option-card.selected { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.2); }

        .btn-group { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-top: 5px; }
        .main-btn { background: var(--accent-color); color: white; border: none; padding: 18px; border-radius: 20px; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .back-btn { background: rgba(255,255,255,0.03); color: var(--text-desc); border: 1px solid rgba(255,255,255,0.08); padding: 18px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .main-btn:disabled { opacity: 0.2; }

        .bmi-container { 
            margin-top: 15px; text-align: center; background: rgba(255, 255, 255, 0.03); 
            padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); animation: fadeIn 0.4s ease;
        }
        .bmi-value { font-size: 16px; color: var(--accent-color); margin-bottom: 8px; }
        .bmi-status { font-size: 11px; padding: 4px 12px; border-radius: 10px; display: inline-block; text-transform: uppercase; }
        .status-low { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-good { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .status-warn { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .status-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .status-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(15, 23, 42, 0.6) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 28px; padding: 30px 20px; text-align: center;
        }
        .cal-ring {
            width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 20px; position: relative;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            background: radial-gradient(closest-side, #020617 85%, transparent 85% 100%),
                        conic-gradient(var(--accent-color) 75%, rgba(59, 130, 246, 0.1) 0);
        }
        .cal-ring span { font-size: 24px; color: var(--text-main); }
        .pfc-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .pfc-box { background: rgba(255,255,255,0.03); border-radius: 18px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .pfc-l { font-size: 9px; color: var(--text-desc); margin-bottom: 5px; }
        .pfc-v { font-size: 13px; color: var(--accent-color); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px);
            display: none; grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-desc); opacity: 0.5; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent-color); }
        .nav-dot { width: 4px; height: 4px; background: var(--accent-color); border-radius: 50%; margin-top: 5px; display: none; }
        .nav-item.active .nav-dot { display: block; }

        .section-title { font-size: 14px; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }
        .daily-task {
            background: var(--card-bg); border-radius: 24px; padding: 18px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .task-icon { width: 48px; height: 48px; background: rgba(59, 130, 246, 0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="survey-page" class="page active">
        <div class="title-wrapper" id="wave-title"></div>
        <div class="main-slogan">My Way — Твой путь</div>
        <div class="step-pure-text" id="step-description"></div>

        <div class="step active" id="s1">
            <input type="text" id="u_name" placeholder="ИМЯ (НЕОБЯЗАТЕЛЬНО)">
            <div class="gender-grid">
                <div class="gender-card" id="g_male" onclick="setG('male')">
                    <svg class="shape-svg" viewBox="0 0 100 120"><circle cx="50" cy="25" r="20" fill="#3b82f6"/><path d="M15 55 L85 55 L50 115 Z" fill="#3b82f6"/></svg>
                    <div class="gender-label">МУЖСКОЙ</div>
                </div>
                <div class="gender-card" id="g_female" onclick="setG('female')">
                    <svg class="shape-svg" viewBox="0 0 100 120"><circle cx="50" cy="25" r="20" fill="#f472b6"/><path d="M50 55 L90 115 L10 115 Z" fill="#f472b6"/></svg>
                    <div class="gender-label">ЖЕНСКИЙ</div>
                </div>
            </div>
            <button class="main-btn" id="b1" disabled onclick="nextS(2)">ДАЛЕЕ</button>
        </div>

        <div class="step" id="s2">
            <input type="number" id="u_age" placeholder="ВОЗРАСТ" oninput="checkS2()">
            <input type="number" id="u_height" placeholder="РОСТ (СМ)" oninput="checkS2()">
            <input type="number" id="u_weight" placeholder="ВЕС (КГ)" oninput="checkS2()">
            <div id="bmi_res" class="bmi-container" style="display:none;"></div>
            <div class="btn-group">
                <button class="back-btn" onclick="nextS(1)">НАЗАД</button>
                <button class="main-btn" id="b2" disabled onclick="nextS(3)">ДАЛЕЕ</button>
            </div>
        </div>

        <div id="s3" class="step">
            <div class="option-card" onclick="setGoal(this, 'weight_loss')">ПОХУДЕНИЕ</div>
            <div class="option-card" onclick="setGoal(this, 'muscle_gain')">НАБОР МАССЫ</div>
            <div class="option-card" onclick="setGoal(this, 'keep_fit')">ПОДДЕРЖАНИЕ ФОРМЫ</div>
            <div class="btn-group">
                <button class="back-btn" onclick="nextS(2)">НАЗАД</button>
                <button class="main-btn" id="b3" disabled onclick="finishSurvey()">ГОТОВО</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="page">
        <div id="tab-home" class="tab-content active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 id="hi_user" style="font-size:18px; margin:0;">ПРИВЕТ, АТЛЕТ</h2>
                <div id="curr_date" style="font-size:11px; opacity:0.5; text-transform:uppercase;"></div>
            </div>
            <div class="status-card">
                <div class="cal-ring"><span id="cal_left">0</span><small style="font-size:9px; opacity:0.6;">ккал</small></div>
                <div class="pfc-row">
                    <div class="pfc-box"><div class="pfc-l">БЕЛКИ</div><div class="pfc-v" id="p_v">0г</div></div>
                    <div class="pfc-box"><div class="pfc-l">ЖИРЫ</div><div class="pfc-v" id="f_v">0г</div></div>
                    <div class="pfc-box"><div class="pfc-l">УГЛЕВ</div><div class="pfc-v" id="c_v">0г</div></div>
                </div>
            </div>
            <div class="section-title">План на день</div>
            <div class="daily-task"><div class="task-icon">🔥</div><div><div style="font-size:14px;">Основная тренировка</div><div style="font-size:11px; color:var(--text-desc);">Нажми, чтобы открыть</div></div></div>
        </div>

        <div id="tab-profile" class="tab-content">
            <h2 style="font-size:18px;">ПРОФИЛЬ</h2>
            <div class="status-card" style="text-align:left; line-height:2;" id="prof_data"></div>
            <button class="back-btn" style="width:100%; margin-top:20px; color:#f87171; border-color:rgba(239,68,68,0.2);" onclick="hardReset()">СБРОСИТЬ ДАННЫЕ</button>
        </div>
    </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
    <div class="nav-item active" onclick="switchTab('home', this)"><span>ГЛАВНАЯ</span><div class="nav-dot"></div></div>
    <div class="nav-item"><span>ПЛАН</span><div class="nav-dot"></div></div>
    <div class="nav-item" onclick="switchTab('profile', this)"><span>ПРОФИЛЬ</span><div class="nav-dot"></div></div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    // ПРОВЕРКА СОХРАНЕНИЯ
    let saved = localStorage.getItem('user_data');
    let data = saved ? JSON.parse(saved) : { name: 'АТЛЕТ', gender: '', age: '', height: '', weight: '', goal: '' };

    const stepsText = {
        1: "Выбери пол и введи имя, чтобы начать путь.",
        2: "Укажи актуальные параметры тела для точного расчета программы.",
        3: "Выбери цель, которой хочешь достичь в ближайшее время."
    };

    function runWaveEffect(text) {
        const wrapper = document.getElementById('wave-title');
        if(!wrapper) return;
        wrapper.innerHTML = '';
        text.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.innerText = char;
            span.className = 'letter animate';
            span.style.animationDelay = `${i * 0.05}s`;
            wrapper.appendChild(span);
        });
    }

    function setG(g) {
        data.gender = g;
        document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('g_'+g).classList.add('selected');
        document.getElementById('b1').disabled = false;
    }

    function checkS2() {
        data.age = document.getElementById('u_age').value;
        data.height = document.getElementById('u_height').value;
        data.weight = document.getElementById('u_weight').value;
        let resBox = document.getElementById('bmi_res');
        if(data.height > 100 && data.weight > 30) {
            let bmi = (data.weight / ((data.height/100)**2)).toFixed(1);
            let st = "", cl = "";
            if(bmi < 18.5) { st = "Дефицит"; cl = "status-low"; }
            else if(bmi < 25) { st = "Норма"; cl = "status-good"; }
            else if(bmi < 30) { st = "Избыток"; cl = "status-warn"; }
            else { st = "Ожирение"; cl = "status-danger"; }
            resBox.innerHTML = `<div class="bmi-value">ИМТ: ${bmi}</div><span class="bmi-status ${cl}">${st}</span>`;
            resBox.style.display = 'block';
        } else resBox.style.display = 'none';
        document.getElementById('b2').disabled = !(data.age && data.height && data.weight);
    }

    function setGoal(el, g) {
        data.goal = g;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('b3').disabled = false;
    }

    function nextS(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        document.getElementById('step-description').innerText = stepsText[n];
        runWaveEffect("ЗАВТРА БУДЕТ ВСЕ ПРОЩЕ");
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        el.classList.add('active');
    }

    function hardReset() {
        if(confirm("Сбросить все данные?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function finishSurvey() {
        let nameIn = document.getElementById('u_name').value.trim();
        if(nameIn) data.name = nameIn;
        
        localStorage.setItem('user_data', JSON.stringify(data));

        let bmr = (10 * data.weight) + (6.25 * data.height) - (5 * data.age) + (data.gender === 'male' ? 5 : -161);
        let tdee = Math.round(bmr * 1.375);
        if(data.goal === 'weight_loss') tdee -= 400;
        if(data.goal === 'muscle_gain') tdee += 400;

        document.getElementById('cal_left').innerText = tdee;
        document.getElementById('p_v').innerText = Math.round(data.weight * 2) + 'г';
        document.getElementById('f_v').innerText = Math.round(data.weight * 0.9) + 'г';
        document.getElementById('c_v').innerText = Math.round((tdee - (data.weight*2*4 + data.weight*0.9*9)) / 4) + 'г';
        document.getElementById('curr_date').innerText = new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
        
        document.getElementById('prof_data').innerHTML = `
            ИМЯ: ${data.name.toUpperCase()}<br>
            РОСТ: ${data.height} СМ<br>
            ВЕС: ${data.weight} КГ<br>
            ЦЕЛЬ: ${data.goal === 'muscle_gain' ? 'НАБОР МАССЫ' : data.goal === 'weight_loss' ? 'ПОХУДЕНИЕ' : 'ПОДДЕРЖАНИЕ'}`;

        document.getElementById('survey-page').style.display = 'none';
        document.getElementById('main-page').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'grid';
        document.getElementById('hi_user').innerText = `ПРИВЕТ, ${data.name.toUpperCase()}`;
    }

    // ЛОГИКА АВТОВХОДА
    if(saved) {
        finishSurvey();
    } else {
        runWaveEffect("ЗАВТРА БУДЕТ ВСЕ ПРОЩЕ");
        document.getElementById('step-description').innerText = stepsText[1];
    }
</script>
</body>
</html>
