<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Way</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #3b82f6;
            --text-main: #f8fafc;
            --text-desc: #cbd5e1;
            --input-bg: #1e293b;
        }

        * {
            font-family: 'Comfortaa', sans-serif;
            font-weight: 700;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            outline: none !important; /* Убираем системные обводки */
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh; overflow: hidden;
        }

        .container { padding: 25px; padding-bottom: 100px; }

        .page { display: none; }
        .page.active { display: block; }

        .step { display: none; flex-direction: column; gap: 20px; }
        .step.active { display: flex; animation: stepFade 0.4s ease forwards; }

        @keyframes stepFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ОДНОРАЗОВАЯ ВОЛНА */
        .title-wrapper { 
            display: flex; justify-content: center; 
            margin-bottom: 5px; min-height: 30px; 
        }
        .letter {
            display: inline-block; font-size: 16px; text-transform: uppercase;
            white-space: pre; opacity: 1;
        }
        .letter.animate { animation: jumpOnce 0.8s ease-out forwards; }

        @keyframes jumpOnce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); color: var(--accent-color); }
            100% { transform: translateY(0); }
        }

        .main-slogan { text-align: center; color: var(--text-desc); font-size: 10px; font-weight: 400; opacity: 0.5; margin-bottom: 20px; letter-spacing: 1px; }

        /* ЛАКОНИЧНЫЙ ТЕКСТ ШАГА */
        .step-pure-text {
            text-align: center; font-size: 13px; color: var(--text-desc);
            font-weight: 400; line-height: 1.5; margin-bottom: 25px;
            padding: 0 10px; min-height: 40px;
        }

        /* ИНПУТЫ БЕЗ МУСОРА */
        input {
            width: 100%; padding: 18px; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
            color: white; font-size: 16px; text-align: center;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent-color); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .gender-card {
            background: var(--card-bg); border-radius: 22px; padding: 30px 10px;
            text-align: center; border: 1px solid transparent; cursor: pointer;
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center;
        }
        .gender-card.selected { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }
        .shape-svg { width: 60px; height: 80px; transition: 0.3s; }
        .gender-label { margin-top: 12px; font-size: 10px; letter-spacing: 1px; color: var(--text-desc); }

        .option-card {
            background: var(--card-bg); padding: 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center; cursor: pointer; transition: 0.2s;
        }
        .option-card.selected { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.2); }

        .btn-group { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-top: 5px; }
        .main-btn {
            background: var(--accent-color); color: white; border: none;
            padding: 18px; border-radius: 20px; font-size: 14px;
            cursor: pointer; text-transform: uppercase;
        }
        .back-btn {
            background: rgba(255,255,255,0.03); color: var(--text-desc); border: 1px solid rgba(255,255,255,0.08);
            padding: 18px; border-radius: 20px; font-size: 13px; cursor: pointer;
        }
        .main-btn:disabled { opacity: 0.2; }

        /* ПОЯСНЕНИЕ ИМТ */
        .bmi-container { margin-top: 10px; text-align: center; animation: fadeIn 0.3s; }
        .bmi-value { font-size: 14px; color: var(--accent-color); margin-bottom: 4px; }
        .bmi-text { font-size: 11px; color: var(--text-desc); font-weight: 400; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: rgba(15, 23, 42, 0.98);
            display: none; grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="survey-page" class="page active">
        <div class="title-wrapper" id="wave-title"></div>
        <div class="main-slogan">My Way — Твой путь</div>
        
        <div class="step-pure-text" id="step-description"></div>

        <div class="step active" id="s1">
            <input type="text" id="u_name" placeholder="ИМЯ (НЕОБЯЗАТЕЛЬНО)">
            <div class="gender-grid">
                <div class="gender-card" id="g_male" onclick="setG('male')">
                    <svg class="shape-svg" viewBox="0 0 100 120">
                        <circle cx="50" cy="25" r="20" fill="#00bfff"/>
                        <path d="M15 55 L85 55 L50 115 Z" fill="#00bfff"/>
                    </svg>
                    <div class="gender-label">МУЖСКОЙ</div>
                </div>
                <div class="gender-card" id="g_female" onclick="setG('female')">
                    <svg class="shape-svg" viewBox="0 0 100 120">
                        <circle cx="50" cy="25" r="20" fill="#ff00ff"/>
                        <path d="M50 55 L90 115 L10 115 Z" fill="#ff00ff"/>
                    </svg>
                    <div class="gender-label">ЖЕНСКИЙ</div>
                </div>
            </div>
            <button class="main-btn" id="b1" disabled onclick="nextS(2)">ДАЛЕЕ</button>
        </div>

        <div class="step" id="s2">
            <input type="number" id="u_age" placeholder="ВОЗРАСТ" oninput="checkS2()">
            <input type="number" id="u_height" placeholder="РОСТ (СМ)" oninput="checkS2()">
            <input type="number" id="u_weight" placeholder="ВЕС (КГ)" oninput="checkS2()">
            
            <div id="bmi_res" class="bmi-container" style="display:none;">
                <div class="bmi-value" id="bmi_val"></div>
                <div class="bmi-text" id="bmi_txt"></div>
            </div>

            <div class="btn-group">
                <button class="back-btn" onclick="nextS(1)">НАЗАД</button>
                <button class="main-btn" id="b2" disabled onclick="nextS(3)">ДАЛЕЕ</button>
            </div>
        </div>

        <div id="s3" class="step">
            <div class="option-card" onclick="setGoal(this, 'weight_loss')">ПОХУДЕНИЕ</div>
            <div class="option-card" onclick="setGoal(this, 'muscle_gain')">НАБОР МАССЫ</div>
            <div class="option-card" onclick="setGoal(this, 'keep_fit')">ПОДДЕРЖАНИЕ ФОРМЫ</div>
            <div class="btn-group">
                <button class="back-btn" onclick="nextS(2)">НАЗАД</button>
                <button class="main-btn" id="b3" disabled onclick="finishSurvey()">ГОТОВО</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="page">
        <h1 id="hi_user" style="text-align:center; margin-top:50px;">ПРИВЕТ</h1>
    </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
    <div style="display:flex; align-items:center; justify-content:center; font-size:10px; opacity:0.5;">ГЛАВНАЯ</div>
    <div style="display:flex; align-items:center; justify-content:center; font-size:10px; opacity:0.5;">ПРОФИЛЬ</div>
    <div style="display:flex; align-items:center; justify-content:center; font-size:10px; opacity:0.5;">НАСТРОЙКИ</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let data = { name: 'АТЛЕТ', gender: '', age: '', height: '', weight: '', goal: '' };

    const stepsText = {
        1: "Выбери пол и введи имя, чтобы начать путь.",
        2: "Укажи актуальные параметры тела для точного расчета программы.",
        3: "Выбери цель, которой хочешь достичь в ближайшее время."
    };

    function runWaveEffect(text) {
        const wrapper = document.getElementById('wave-title');
        wrapper.innerHTML = '';
        text.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.innerText = char;
            span.className = 'letter animate';
            span.style.animationDelay = `${i * 0.05}s`;
            wrapper.appendChild(span);
        });
    }

    function setG(g) {
        data.gender = g;
        document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('g_'+g).classList.add('selected');
        document.getElementById('b1').disabled = false;
    }

    function checkS2() {
        data.age = document.getElementById('u_age').value;
        data.height = document.getElementById('u_height').value;
        data.weight = document.getElementById('u_weight').value;
        
        let resBox = document.getElementById('bmi_res');
        if(data.height > 100 && data.weight > 30) {
            let bmi = (data.weight / ((data.height/100)**2)).toFixed(1);
            let txt = "";
            if(bmi < 18.5) txt = "Дефицит массы тела. Нужно больше калорий.";
            else if(bmi < 25) txt = "Нормальный вес. Отличный старт!";
            else if(bmi < 30) txt = "Избыточный вес. Рекомендуем дефицит калорий.";
            else txt = "Ожирение. Требуется строгий контроль рациона.";
            
            document.getElementById('bmi_val').innerText = `Твой ИМТ: ${bmi}`;
            document.getElementById('bmi_txt').innerText = txt;
            resBox.style.display = 'block';
        } else resBox.style.display = 'none';
        
        document.getElementById('b2').disabled = !(data.age && data.height && data.weight);
    }

    function setGoal(el, g) {
        data.goal = g;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('b3').disabled = false;
    }

    function nextS(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+n).classList.add('active');
        document.getElementById('step-description').innerText = stepsText[n];
        runWaveEffect("ЗАВТРА БУДЕТ ВСЕ ПРОЩЕ"); // Перезапуск волны при смене шага
    }

    function finishSurvey() {
        let name = document.getElementById('u_name').value.trim();
        if(name) data.name = name;
        tg.sendData(JSON.stringify(data));
        document.getElementById('survey-page').classList.remove('active');
        document.getElementById('main-page').classList.add('active');
        document.getElementById('bottom-nav').style.display = 'grid';
        document.getElementById('hi_user').innerText = `ПРИВЕТ, ${data.name.toUpperCase()}`;
    }

    // Первый запуск
    runWaveEffect("ЗАВТРА БУДЕТ ВСЕ ПРОЩЕ");
    document.getElementById('step-description').innerText = stepsText[1];
</script>
</body>
</html>
